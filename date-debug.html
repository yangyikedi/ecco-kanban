<!DOCTYPE html>
<html>
<head>
    <title>🔍 看板日期调试</title>
    <style>
        body { 
            font-family: Arial; 
            margin: 20px; 
            background: #f5f5f5;
        }
        .debug-card { 
            background: white; 
            margin: 15px 0; 
            padding: 20px; 
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .date-info { 
            font-size: 1.2em; 
            font-weight: bold; 
            color: #2c3e50;
            margin: 10px 0;
        }
        .raw-data {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
        }
        .current-time {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🔍 Ecco看板日期调试页面</h1>
    
    <div class="debug-card">
        <h2>📅 当前系统时间</h2>
        <div class="date-info current-time" id="systemTime">加载中...</div>
    </div>
    
    <div class="debug-card">
        <h2>📊 看板数据中的日期</h2>
        <div id="kanbanDates">加载中...</div>
    </div>
    
    <div class="debug-card">
        <h2>🔍 原始JSON数据</h2>
        <div class="raw-data" id="rawData">加载中...</div>
    </div>
    
    <div class="debug-card">
        <h2>🌐 浏览器信息</h2>
        <div id="browserInfo">
            <p><strong>User Agent:</strong> <span id="userAgent"></span></p>
            <p><strong>时区:</strong> <span id="timezone"></span></p>
            <p><strong>语言:</strong> <span id="language"></span></p>
        </div>
    </div>

    <script>
        function updateSystemTime() {
            const now = new Date();
            document.getElementById('systemTime').innerHTML = `
                <p>🕐 完整时间: ${now.toString()}</p>
                <p>📅 格式化: ${now.getFullYear()}年${(now.getMonth()+1).toString().padStart(2,'0')}月${now.getDate().toString().padStart(2,'0')}日</p>
                <p>⏰ 时分秒: ${now.toLocaleTimeString('zh-CN')}</p>
            `;
        }
        
        function updateBrowserInfo() {
            document.getElementById('userAgent').textContent = navigator.userAgent;
            document.getElementById('timezone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('language').textContent = navigator.language;
        }
        
        async function loadKanbanDates() {
            try {
                const response = await fetch('./data/kanban.json');
                const data = await response.json();
                
                // 显示格式化的日期信息
                document.getElementById('kanbanDates').innerHTML = `
                    <div class="date-info">
                        <p><strong>今日:</strong> ${data.periods.today.label || '未定义'}</p>
                        <p><strong>本周:</strong> ${data.periods.week.label || '未定义'}</p>
                        <p><strong>本月:</strong> ${data.periods.month.label || '未定义'}</p>
                    </div>
                `;
                
                // 显示原始JSON
                document.getElementById('rawData').innerHTML = `
                    <pre>${JSON.stringify(data.periods, null, 2)}</pre>
                `;
                
            } catch (error) {
                document.getElementById('kanbanDates').innerHTML = 
                    `<p style="color: red;">❌ 数据加载失败: ${error.message}</p>`;
                document.getElementById('rawData').innerHTML = 
                    `<p style="color: red;">❌ 无法加载JSON数据</p>`;
            }
        }
        
        // 初始化
        updateSystemTime();
        updateBrowserInfo();
        loadKanbanDates();
        
        // 每秒更新系统时间
        setInterval(updateSystemTime, 1000);
    </script>
</body>
</html>
