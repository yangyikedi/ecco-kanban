<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecco 智能看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .period-nav {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .period-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 30px;
        }
        
        .period-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .period-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 3px solid;
        }
        
        .today-section .period-header {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border-color: #FF6B6B;
        }
        
        .week-section .period-header {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
            border-color: #4ECDC4;
        }
        
        .month-section .period-header {
            background: linear-gradient(135deg, #45B7D1, #96C93D);
            color: white;
            border-color: #45B7D1;
        }
        
        .task-group {
            padding: 20px;
        }
        
        .task-group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #555;
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .task-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .task-item.completed {
            background: #d4edda;
            border-color: #c3e6cb;
            opacity: 0.8;
        }
        
        .task-item.in-progress {
            background: #fff3cd;
            border-color: #ffeaa7;
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .task-name {
            font-weight: 600;
            color: #2c3e50;
        }
        
        .task-status {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-todo {
            background: #e9ecef;
            color: #6c757d;
        }
        
        .status-in-progress {
            background: #ffeaa7;
            color: #d68910;
        }
        
        .status-completed {
            background: #c3e6cb;
            color: #155724;
        }
        
        .task-progress {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .task-tags {
            display: flex;
            gap: 6px;
        }
        
        .tag {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .task-people {
            display: flex;
            gap: 6px;
        }
        
        .person {
            background: #764ba2;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 40px 20px;
        }
        
        .last-updated {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px;
            margin-top: 0;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .period-nav {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .stats {
                grid-template-columns: 1fr;
                margin: 20px;
            }
            
            .dashboard {
                margin: 20px;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="last-updated" id="lastUpdated"></div>
            <h1>📊 Ecco 智能看板</h1>
            <div class="period-nav">
                <div class="period-badge" id="todayPeriod"></div>
                <div class="period-badge" id="weekPeriod"></div>
                <div class="period-badge" id="monthPeriod"></div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">-</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">-</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="progressPercent">-</div>
                <div class="stat-label">整体进度</div>
            </div>
        </div>
        
        <div class="dashboard">
            <!-- 今日 -->
            <div class="period-section today-section">
                <div class="period-header">
                    📅 <span id="todayHeader">今日</span>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        🎯 我做
                    </div>
                    <div class="task-list" id="todayMyTasks"></div>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        👥 我跟进
                    </div>
                    <div class="task-list" id="todayFollowups"></div>
                </div>
            </div>
            
            <!-- 本周 -->
            <div class="period-section week-section">
                <div class="period-header">
                    📅 <span id="weekHeader">本周</span>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        🎯 我做
                    </div>
                    <div class="task-list" id="weekMyTasks"></div>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        👥 我跟进
                    </div>
                    <div class="task-list" id="weekFollowups"></div>
                </div>
            </div>
            
            <!-- 当月 -->
            <div class="period-section month-section">
                <div class="period-header">
                    📅 <span id="monthHeader">当月</span>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        🎯 我做
                    </div>
                    <div class="task-list" id="monthMyTasks"></div>
                </div>
                <div class="task-group">
                    <div class="task-group-title">
                        👥 我跟进
                    </div>
                    <div class="task-list" id="monthFollowups"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 看板数据和渲染逻辑
        let kanbanData = null;
        
        async function loadKanbanData() {
            try {
                const response = await fetch('./data/kanban.json');
                kanbanData = await response.json();
                renderKanban();
            } catch (error) {
                console.error('加载看板数据失败:', error);
            }
        }
        
        function renderKanban() {
            if (!kanbanData) return;
            
            // 更新时间显示
            const lastUpdated = new Date(kanbanData.last_updated);
            document.getElementById('lastUpdated').textContent = 
                `更新于 ${lastUpdated.toLocaleTimeString('zh-CN')}`;
            
            // 更新周期显示
            document.getElementById('todayPeriod').textContent = kanbanData.periods.today.display;
            document.getElementById('weekPeriod').textContent = kanbanData.periods.week.display;
            document.getElementById('monthPeriod').textContent = kanbanData.periods.month.display;
            
            document.getElementById('todayHeader').textContent = kanbanData.periods.today.display;
            document.getElementById('weekHeader').textContent = kanbanData.periods.week.display;
            document.getElementById('monthHeader').textContent = kanbanData.periods.month.display;
            
            // 渲染任务列表
            renderTaskList('todayMyTasks', kanbanData.tasks.today.my_tasks);
            renderTaskList('todayFollowups', kanbanData.tasks.today.followups);
            renderTaskList('weekMyTasks', kanbanData.tasks.week.my_tasks);
            renderTaskList('weekFollowups', kanbanData.tasks.week.followups);
            renderTaskList('monthMyTasks', kanbanData.tasks.month.my_tasks);
            renderTaskList('monthFollowups', kanbanData.tasks.month.followups);
            
            // 更新统计信息
            updateStats();
        }
        
        function renderTaskList(containerId, tasks) {
            const container = document.getElementById(containerId);
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无任务</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status}" onclick="toggleTask('${task.name}')">
                    <div class="task-header">
                        <div class="task-name">${task.name}</div>
                        <div class="task-status status-${task.status}">
                            ${getStatusText(task.status)}
                        </div>
                    </div>
                    <div class="task-progress">
                        <div class="progress-fill" style="width: ${task.progress}%"></div>
                    </div>
                    <div class="task-meta">
                        <div class="task-tags">
                            ${task.tags.filter(tag => !['今日', '本周', '当月', '跟进'].includes(tag))
                                      .map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="task-people">
                            ${task.people.map(person => `<span class="person">@${person}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const statusMap = {
                'todo': '待办',
                'in_progress': '进行中',
                'completed': '完成'
            };
            return statusMap[status] || status;
        }
        
        function toggleTask(taskName) {
            console.log('切换任务状态:', taskName);
            // TODO: 实现任务状态切换逻辑
        }
        
        function updateStats() {
            let totalTasks = 0;
            let completedTasks = 0;
            let totalProgress = 0;
            
            Object.values(kanbanData.tasks).forEach(period => {
                [...period.my_tasks, ...period.followups].forEach(task => {
                    totalTasks++;
                    if (task.status === 'completed') {
                        completedTasks++;
                    }
                    totalProgress += task.progress;
                });
            });
            
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completedTasks;
            document.getElementById('progressPercent').textContent = 
                totalTasks > 0 ? Math.round(totalProgress / totalTasks) + '%' : '0%';
        }
        
        // 自动刷新
        function autoRefresh() {
            loadKanbanData();
            setTimeout(autoRefresh, 60000); // 每分钟刷新
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            autoRefresh();
        });
    </script>
</body>
</html>
